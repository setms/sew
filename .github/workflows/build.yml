name: Build

concurrency: build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-home-cache-includes: |
            caches/modules-2
            caches/jars-9
            wrapper
          gradle-home-cache-excludes: |
            **/transforms/
          validate-wrappers: false

      - name: Cache Pitest analysis
        uses: actions/cache@v5
        with:
          path: ~/.pitest/cache
          key: ${{ runner.os }}-pitest-v1
          restore-keys: |
            ${{ runner.os }}-pitest-

      - name: Build IntelliJ plugin
        run: ./gradlew check :intellij:buildPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: intellij/build/distributions/*.zip
          tag_name: latest
          name: "Development Build (Latest)"
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}

      - name: Collect transcript
        id: transcript
        if: always()
        run: |
          if [ -d "swe/build/e2e-transcript" ]; then
            cd swe/build/e2e-transcript
            zip -r ../e2e-transcript.zip .
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Directory not found; skipping zip."
          fi

      - name: Upload transcript
        if: steps.transcript.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-transcript
          path: swe/build/e2e-transcript.zip
          if-no-files-found: error
