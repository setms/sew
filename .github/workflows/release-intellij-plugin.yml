name: Build and Release IntelliJ Plugin

concurrency: build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  checks: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-home-cache-includes: |
            caches/modules-2
            caches/jars-9
          validate-wrappers: false

      - name: Cache Pitest analysis
        uses: actions/cache@v5
        with:
          path: ~/.pitest/cache
          key: ${{ runner.os }}-pitest-v1
          restore-keys: |
            ${{ runner.os }}-pitest-

      - name: Build IntelliJ plugin
        run: ./gradlew check :intellij:buildPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: intellij/build/distributions/*.zip
          tag_name: latest
          name: "Development Build (Latest)"
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}

      - name: Report on tests
        uses: mikepenz/action-junit-report@v6
        if: failure()
        with:
          report_paths: '**/TEST-*.xml'
